name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cargo check
        run: cargo check -p geny-harness-core

      - name: Cargo test
        run: cargo test -p geny-harness-core

      - name: Cargo clippy
        run: cargo clippy -p geny-harness-core -- -D warnings -A dead_code

  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

  python-build-test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install maturin
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install maturin

      - name: Build and install locally
        run: |
          source .venv/bin/activate
          maturin develop -m crates/geny-harness-py/Cargo.toml

      - name: Verify import
        run: |
          source .venv/bin/activate
          python -c "import geny_harness; print(f'geny-harness v{geny_harness.__version__}')"

      - name: Run tests (if exist)
        run: |
          source .venv/bin/activate
          if [ -n "$(find tests -name '*.py' 2>/dev/null)" ]; then
            uv pip install pytest pytest-asyncio
            pytest --tb=short -q
          fi

  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist -m crates/geny-harness-py/Cargo.toml
          manylinux: auto

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl
