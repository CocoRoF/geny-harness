name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      skip_tests:
        description: "Skip tests before publishing"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  # ── Pre-flight: run tests ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_tests) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo test (core)
        run: cargo test -p geny-harness-core

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Install Python 3.12 via uv
        run: uv python install 3.12

      - name: Build and verify Python import
        run: |
          uv venv --python 3.12
          uv pip install maturin
          source .venv/bin/activate
          maturin develop -m crates/geny-harness-py/Cargo.toml
          python -c "import geny_harness; print(f'geny-harness v{geny_harness.__version__}')"

  # ── Build wheels for all platforms ─────────────────────────────────────
  build-wheels:
    name: Build wheels (${{ matrix.target }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    strategy:
      matrix:
        include:
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64
          # Linux aarch64
          - os: ubuntu-latest
            target: aarch64
          # Windows x86_64
          - os: windows-latest
            target: x64
          # macOS x86_64
          - os: macos-13
            target: x86_64
          # macOS Apple Silicon (arm64)
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -m crates/geny-harness-py/Cargo.toml
          manylinux: auto

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  # ── Build source distribution ──────────────────────────────────────────
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist -m crates/geny-harness-py/Cargo.toml

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # ── Publish to TestPyPI ────────────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist]
    if: >-
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/geny-harness
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{wheels-*,sdist}"
          merge-multiple: true

      - name: List distribution files
        run: ls -la dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ── Publish to PyPI ────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: >-
      (github.event_name == 'release') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/geny-harness
    permissions:
      id-token: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "{wheels-*,sdist}"
          merge-multiple: true

      - name: List distribution files
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
